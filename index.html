<!DOCTYPE html>
<html lang="en">
    <head>
        <title>solOSis - Web OS</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
        <link rel="stylesheet" href="solOSis.css">
    </head>
    <body>
        <div id="top-bar">
            <img id="solosis-come-back" src="solosis-front.png">
            <p id="time">13:21</p>
        </div>
        
        <div id="welcome-page">

            <div id="welcome-pageheader">
                <p id="welcome-pageclose"> X </p>
            </div>

            <div id="welcome-title">
                <p id="welcome-1">Welcome to sol</p>
                <p id="welcome-2">os</p>
                <p id="welcome-3">is</p>
            </div>
            
            <img id="hello-solosis" src="solosis-front.png" alt="Solosis Pokemon">
            <p id="introduction">My name is Juli, im 18 and new to web design.
            My favorite pokemon is, you guessed it, solosis. That's also this webOS's theme!</p>
            <p id="find-me">Here's where you can find me!</p>
            
            <div class="find-me-buttons">
                <a href="https://www.github.com/julietasegovia">
                    <img src="github.png" alt="GitHub" id="my-github"> 
                </a>
                <a href="https://x.com/who_lee__">
                    <img src="twitter.png" alt="Twitter" id="my-twitter"> 
                </a>
            </div>
        
        </div>

        <div id="desktop-apps">
            <div id="about-me">
                <img id="about-logo" src="about.png">
                <p>AboutMe.exe</p>
            </div>
            <div id="system-app">
                <img id="system-logo" src="system.png">
                <p>System.exe</p>
            </div>
            <div id="paint-app">
                <img id="paint-logo" src="paint.png">
                <p>Paint.exe</p>
            </div>
            <div id="note-app">
                <img id="note-logo" src="notes.png">
                <p>Notes.exe</p>
            </div>
        </div>

        <script src="solOSis.js"></script>
    </body>
</html>
